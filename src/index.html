<!DOCTYPE html>
<html>
  <head>
    <title>Alice Manifold | High-Fidelity Research Build</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --warn: #ff0055; --bg: rgba(5, 7, 12, 0.9); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #000; color: #fff; }
        
        #dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            width: 360px; background: var(--bg); padding: 25px; 
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); backdrop-filter: blur(15px);
        }

        .label { font-size: 10px; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { 
            padding: 12px; border: 1px solid var(--accent); border-radius: 8px; 
            background: transparent; color: var(--accent); font-weight: bold;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 10px;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        
        .live-stats { 
            font-family: monospace; font-size: 12px; margin-top: 20px; 
            padding: 10px; background: rgba(0,0,0,0.5); border-radius: 5px;
        }
        .divergence-alert { color: var(--warn); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
    </style>
  </head>
  <body>

    <div id="dashboard">
        <div class="label">Neural Synchronization Dashboard</div>
        <input type="range" id="timeline" min="0" max="371" value="0">
        
        <div style="display:flex; justify-content: space-between; font-family: monospace; font-size: 12px; margin-top: 5px;">
            <span id="current-time">00:00</span>
            <span id="current-tr">TR 0</span>
            <span>09:17</span>
        </div>

        <div class="btn-grid">
            <button id="playBtn">Initialize Sync</button>
            <button onclick="resetSim()">Reset Data</button>
        </div>

        <div class="btn-grid">
            <button onclick="jumpTo(60)" style="border-color: #ffaa00; color: #ffaa00;">Zone 1: The Fall</button>
            <button onclick="jumpTo(326)" style="border-color: #ae00ff; color: #ae00ff;">Zone 2: Tears</button>
        </div>

        <div class="live-stats">
            MANIFOLD DRIFT: <span id="drift-val" style="color: var(--accent)">0.0000</span><br>
            <div id="milestone-text" style="margin-top:5px; color:#888;">System Standby...</div>
        </div>
    </div>

    <audio id="aliceAudio" src="alice_audio.wav" preload="auto"></audio>

    <a-scene background="color: #000" renderer="colorManagement: true; antialias: true;">
      <a-entity environment="preset: stars; dressingAmount: 0; grid: none; shadow: false;"></a-entity>

      <a-entity id="rig" position="0 1.6 5">
        <a-entity camera look-controls wasd-controls>
            <a-text id="hud" value="" position="0 -0.8 -1.2" scale="0.2 0.2 0.2" align="center" color="#00f2ff"></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="simulation-space" scale="6 6 6" position="-3 0 -3">
        <a-entity id="cursor18">
            <a-sphere radius="0.02" material="color: #00f2ff; emissive: #00f2ff; emissiveIntensity: 5; opacity: 0.8; transparent: true"></a-sphere>
            <a-light type="point" intensity="0.5" distance="0.5" color="#00f2ff"></a-light>
        </a-entity>

        <a-entity id="cursor23">
            <a-sphere radius="0.02" material="color: #ff0055; emissive: #ff0055; emissiveIntensity: 5; opacity: 0.8; transparent: true"></a-sphere>
            <a-light type="point" intensity="0.5" distance="0.5" color="#ff0055"></a-light>
        </a-entity>
        
        <a-entity id="trace-container"></a-entity>
      </a-entity>
    </a-scene>

    <script>
        const audio = document.getElementById('aliceAudio');
        const timeline = document.getElementById('timeline');
        const driftDisplay = document.getElementById('drift-val');
        const currentTimeLabel = document.getElementById('current-time');
        const trDisplay = document.getElementById('current-tr');
        const milestoneLabel = document.getElementById('milestone-text');
        const traceContainer = document.getElementById('trace-container');
        const hud = document.getElementById('hud');
        
        let aliceData = [];
        const trDuration = 1.5;

        fetch('alice_vr_data.json').then(r => r.json()).then(data => {
            aliceData = data;
            initSim();
        });

        function formatTime(s) {
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
        }

        function initSim() {
            document.getElementById('playBtn').addEventListener('click', function() {
                if(audio.paused) { audio.play(); this.innerText = "PAUSE SYNC"; }
                else { audio.pause(); this.innerText = "RESUME SYNC"; }
            });

            timeline.addEventListener('input', (e) => {
                audio.currentTime = e.target.value * trDuration;
                traceContainer.innerHTML = ''; // Wipe history for clear re-entry
            });

            function syncLoop() {
                let tr = Math.floor(audio.currentTime / trDuration);
                
                if(tr < aliceData.length) {
                    const d = aliceData[tr];
                    
                    // UI & Labels
                    timeline.value = tr;
                    trDisplay.innerText = `TR ${tr}`;
                    currentTimeLabel.innerText = formatTime(audio.currentTime);
                    driftDisplay.innerText = d.drift.toFixed(5);
                    
                    // Position Orbs
                    document.getElementById('cursor18').setAttribute('position', `${d.x18_vr} ${d.y18_vr} ${d.z18_vr}`);
                    document.getElementById('cursor23').setAttribute('position', `${d.x23_vr} ${d.y23_vr} ${d.z23_vr}`);

                    // 1. ORGANIC TRACE: Instead of dots, we drop fading cubes
                    if(!audio.paused) {
                        dropFadingVoxel(d.x18_vr, d.y18_vr, d.z18_vr, '#00f2ff');
                        dropFadingVoxel(d.x23_vr, d.y23_vr, d.z23_vr, '#ff0055');
                        
                        // 2. NEON TETHERS: Lightning arcs for divergence
                        if(d.drift > 0.05) {
                            renderNeonTether(d);
                        }
                    }

                    // 3. ANALYTICAL HUD (Based on your discoveries)
                    updateMilestones(tr, d.drift);
                }
                requestAnimationFrame(syncLoop);
            }
            syncLoop();
        }

        function dropFadingVoxel(x, y, z, color) {
            let p = document.createElement('a-box');
            p.setAttribute('position', `${x} ${y} ${z}`);
            p.setAttribute('scale', '0.005 0.005 0.005');
            p.setAttribute('material', {color: color, emissive: color, emissiveIntensity: 2, opacity: 0.3, transparent: true});
            traceContainer.appendChild(p);
            
            // Auto-fade logic (Realistic temporal decay)
            setTimeout(() => { if(p.parentNode) p.parentNode.removeChild(p); }, 20000); 
        }

        function renderNeonTether(d) {
            let line = document.createElement('a-entity');
            line.setAttribute('line', {
                start: `${d.x18_vr} ${d.y18_vr} ${d.z18_vr}`,
                end: `${d.x23_vr} ${d.y23_vr} ${d.z23_vr}`,
                color: '#ffffff',
                opacity: 0.5
            });
            // Flickering animation for "Neural Tension"
            line.setAttribute('animation', 'property: components.line.material.opacity; from: 0.5; to: 0.1; dir: alternate; dur: 50; loop: true');
            traceContainer.appendChild(line);
            setTimeout(() => { if(line.parentNode) line.parentNode.removeChild(line); }, 1500);
        }

        function updateMilestones(tr, drift) {
            if (tr >= 13 && tr <= 15) {
                milestoneLabel.innerHTML = `<span class="divergence-alert">00:20 - NARRATIVE ONSET</span>`;
                hud.setAttribute('value', "NARRATIVE ONSET: INITIAL SPLIT");
            } else if (tr >= 66 && tr <= 70) {
                milestoneLabel.innerHTML = `<span class="divergence-alert">01:39 - PEAK DRIFT (THE FALL)</span>`;
                hud.setAttribute('value', `MAX DIVERGENCE: ${drift.toFixed(4)}`);
            } else if (tr >= 326 && tr <= 330) {
                milestoneLabel.innerHTML = `<span class="divergence-alert">08:09 - MICRO-BURST FRUSTRATION</span>`;
                hud.setAttribute('value', "ZONE 2: COGNITIVE FRUSTRATION");
            } else {
                milestoneLabel.innerText = "STATE: STABLE ALIGNMENT";
                hud.setAttribute('value', "");
            }
        }

        window.jumpTo = (tr) => {
            audio.currentTime = tr * trDuration;
            traceContainer.innerHTML = '';
            audio.play();
        };

        window.resetSim = () => {
            audio.currentTime = 0;
            traceContainer.innerHTML = '';
            audio.pause();
        };
    </script>
  </body>
</html>
