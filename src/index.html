<!DOCTYPE html>
<html>
  <head>
    <title>Alice Manifold | Research Suite V3</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <style>
        :root { --accent: #00f2ff; --warn: #ff0055; --bg: rgba(5, 7, 12, 0.96); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; }
        
        #dashboard {
            position: fixed; top: 20px; left: 20px; width: 340px; 
            background: var(--bg); padding: 25px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            z-index: 999999; pointer-events: all; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .label { font-size: 9px; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; margin-top: 12px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        
        #audio-viz {
            width: 100%; height: 45px; background: rgba(0,0,0,0.3);
            display: flex; align-items: flex-end; gap: 2px; margin-top: 5px;
            border-radius: 4px; overflow: hidden; padding: 2px; border: 1px solid rgba(0,242,255,0.1);
        }
        .viz-bar { flex: 1; background: var(--accent); min-height: 2px; transition: height 0.05s ease; opacity: 0.8; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .tri-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 5px; }
        
        button { 
            padding: 10px; border: 1px solid var(--accent); border-radius: 6px; 
            background: transparent; color: var(--accent); font-weight: bold;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 9px;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        
        .live-stats { 
            font-family: monospace; font-size: 11px; margin-top: 15px; 
            padding: 12px; background: rgba(0,0,0,0.6); border-radius: 5px;
            line-height: 1.6; border-left: 2px solid var(--accent);
        }
        .stat-val { color: var(--accent); float: right; }
        .divergence-alert { color: var(--warn); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
    </style>
  </head>
  <body>

    <div id="dashboard">
        <div class="label">Timeline Navigation</div>
        <input type="range" id="timeline" min="0" max="371" value="0">
        <div style="display:flex; justify-content: space-between; font-family: monospace; font-size: 10px;">
            <span id="current-time">00:00</span>
            <span id="current-tr">TR 0</span>
        </div>

        <div class="label">Stimulus Audio Frequency</div>
        <div id="audio-viz"></div>

        <div class="label">Playback Controls</div>
        <div class="btn-grid">
            <button id="playBtn">Initialize Sync</button>
            <button onclick="resetSim()">Reset Data</button>
        </div>
        <div class="tri-grid">
            <button onclick="setSpeed(0.5)">0.5x</button>
            <button onclick="setSpeed(1)">1.0x</button>
            <button onclick="setSpeed(2)">2.0x</button>
        </div>

        <div class="label">Audio & Environment</div>
        <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.5">
        <div class="btn-grid">
            <button onclick="toggleShell()">Toggle Shell</button>
            <button onclick="takeScreenshot()" style="border-color: #ff00ff; color: #ff00ff;">Capture VR</button>
        </div>

        <div class="label">Data Management</div>
        <div class="btn-grid">
            <button onclick="exportSession()" style="border-color: #22ff00; color: #22ff00;">Export JSON</button>
            <button onclick="document.getElementById('fileInput').click()" style="border-color: #bbff00; color: #bbff00;">Import JSON</button>
        </div>
        <input type="file" id="fileInput" style="display:none" onchange="importSession(event)">

        <div class="live-stats">
            DRIFT CURRENT <span id="drift-val" class="stat-val">0.0000</span><br>
            DRIFT PEAK <span id="drift-peak" class="stat-val">0.0000</span><br>
            VELOCITY <span id="velocity-val" class="stat-val">0.0000</span><br>
            <div id="milestone-text" style="margin-top:8px; color:#888; border-top: 1px solid #333; padding-top:5px;">System Standby...</div>
        </div>
    </div>

    <audio id="aliceAudio" src="../data/alice_audio.wav" preload="auto" crossorigin="anonymous"></audio>

    <a-scene background="color: #010205" renderer="antialias: true; logarithmicDepthBuffer: true;" screenshot>
      <a-grid material="color: #1a1a2e; opacity: 0.1; transparent: true;"></a-grid>

      <a-entity id="brain-system" position="0 1.6 -4" animation="property: rotation; to: 0 360 0; dur: 120000; easing: linear; loop: true">
          <a-entity id="brain-shell" 
                    geometry="primitive: sphere; radius: 2.3; segmentsWidth: 64; segmentsHeight: 64"
                    material="color: #00f2ff; emissive: #00f2ff; emissiveIntensity: 0.5; opacity: 0.08; transparent: true; wireframe: true; side: double; depthWrite: false;">
          </a-entity>
          <a-entity id="brain-core" 
                    geometry="primitive: sphere; radius: 2.1"
                    material="color: #4cc3ff; opacity: 0.03; transparent: true; side: back; depthWrite: false;">
          </a-entity>

          <a-entity id="simulation-space" scale="4.5 4.5 4.5">
            <a-entity id="cursor18"><a-sphere radius="0.025" material="color: #00f2ff; emissive: #00f2ff; emissiveIntensity: 20;"></a-sphere></a-entity>
            <a-entity id="cursor23"><a-sphere radius="0.025" material="color: #ff0055; emissive: #ff0055; emissiveIntensity: 20;"></a-sphere></a-entity>
            <a-entity id="trace-container"></a-entity>
          </a-entity>
      </a-entity>

      <a-entity id="rig" position="0 0 5">
        <a-camera look-controls wasd-controls></a-camera>
      </a-entity>
    </a-scene>

   <script>
    const audio = document.getElementById('aliceAudio');
    const timeline = document.getElementById('timeline');
    const vol = document.getElementById('volumeControl');
    const driftDisplay = document.getElementById('drift-val');
    const peakDisplay = document.getElementById('drift-peak');
    const velocityDisplay = document.getElementById('velocity-val');
    const milestoneLabel = document.getElementById('milestone-text');
    const brainShell = document.getElementById('brain-shell');
    const brainSystem = document.getElementById('brain-system');
    const traceContainer = document.getElementById('trace-container');
    const vizContainer = document.getElementById('audio-viz');
    
    let aliceData = [];
    const trDuration = 1.5;
    let state = { seeking: false, lastPos: null, lastTR: -1, peakDrift: 0, shellVisible: true };
    
    // Web Audio Variables
    let audioCtx, analyser, dataArray, source;
    const barCount = 32;
    const bars = [];

    // Init Viz Bars
    for(let i=0; i<barCount; i++) {
        let bar = document.createElement('div');
        bar.className = 'viz-bar';
        vizContainer.appendChild(bar);
        bars.push(bar);
    }

    fetch('../data/alice_vr_data.json').then(r => r.json()).then(data => { aliceData = data; initSim(); });

    function initAudioEngine() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
    }

    function initSim() {
        document.getElementById('playBtn').addEventListener('click', function() {
            initAudioEngine();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(audio.paused) { audio.play(); this.innerText = "PAUSE SYNC"; } 
            else { audio.pause(); this.innerText = "RESUME SYNC"; }
        });

        vol.addEventListener('input', (e) => audio.volume = e.target.value);
        timeline.addEventListener('input', () => state.seeking = true);
        timeline.addEventListener('change', (e) => {
            audio.currentTime = e.target.value * trDuration;
            traceContainer.innerHTML = '';
            state.seeking = false;
        });

        function loop() {
            // Audio Reactive Logic
            if(analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<barCount; i++) {
                    let val = dataArray[i] / 2.5;
                    bars[i].style.height = `${val}px`;
                    bars[i].style.backgroundColor = (driftDisplay.innerText > 0.05) ? '#ff0055' : '#00f2ff';
                    sum += dataArray[i];
                }
                
                // Pulse the VR Shell
                if (state.shellVisible) {
                    let avg = sum / barCount;
                    let pulse = avg / 255;
                    brainShell.setAttribute('material', 'opacity', 0.08 + (pulse * 0.15));
                    brainShell.setAttribute('material', 'emissiveIntensity', 0.5 + (pulse * 3));
                }
            }

            let tr = Math.floor(audio.currentTime / trDuration);
            if(tr < aliceData.length) {
                const d = aliceData[tr];
                if (!audio.paused && !state.seeking) {
                    timeline.value = tr;
                    document.getElementById('current-tr').innerText = `TR ${tr}`;
                    document.getElementById('current-time').innerText = new Date(audio.currentTime * 1000).toISOString().substr(14, 5);
                }
                if (d) {
                    // Velocity calculation (Neural displacement)
                    if (tr !== state.lastTR) {
                        if (state.lastPos) {
                            const dist = Math.sqrt(Math.pow(d.x18_vr-state.lastPos.x,2)+Math.pow(d.y18_vr-state.lastPos.y,2)+Math.pow(d.z18_vr-state.lastPos.z,2));
                            velocityDisplay.innerText = (dist * 10).toFixed(5);
                        }
                        state.lastPos = {x: d.x18_vr, y: d.y18_vr, z: d.z18_vr};
                        state.lastTR = tr;
                    }

                    driftDisplay.innerText = d.drift.toFixed(5);
                    if(d.drift > state.peakDrift) {
                        state.peakDrift = d.drift;
                        peakDisplay.innerText = state.peakDrift.toFixed(5);
                    }

                    document.getElementById('cursor18').setAttribute('position', `${d.x18_vr} ${d.y18_vr} ${d.z18_vr}`);
                    document.getElementById('cursor23').setAttribute('position', `${d.x23_vr} ${d.y23_vr} ${d.z23_vr}`);

                    if(d.drift > 0.05) {
                        brainShell.setAttribute('material', 'color', '#ff0055');
                        milestoneLabel.innerHTML = `<span class="divergence-alert">HIGH DRIFT DETECTED</span>`;
                        renderTether(d);
                    } else {
                        brainShell.setAttribute('material', 'color', '#00f2ff');
                        milestoneLabel.innerText = "ALIGNED STATE";
                    }

                    if (!audio.paused && !state.seeking) {
                        dropVoxel(d.x18_vr, d.y18_vr, d.z18_vr, '#00f2ff');
                        dropVoxel(d.x23_vr, d.y23_vr, d.z23_vr, '#ff0055');
                    }
                }
            }
            requestAnimationFrame(loop);
        }
        loop();
    }

    function dropVoxel(x, y, z, color) {
        let p = document.createElement('a-box');
        p.setAttribute('position', `${x} ${y} ${z}`);
        p.setAttribute('scale', '0.006 0.006 0.006');
        p.setAttribute('material', {color: color, emissive: color, emissiveIntensity: 3, opacity: 0.5, transparent: true});
        p.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 8000; easing: linear');
        traceContainer.appendChild(p);
        setTimeout(() => { if(p.parentNode) p.parentNode.removeChild(p); }, 8000); 
    }

    function renderTether(d) {
        let line = document.createElement('a-entity');
        line.setAttribute('line', { start: `${d.x18_vr} ${d.y18_vr} ${d.z18_vr}`, end: `${d.x23_vr} ${d.y23_vr} ${d.z23_vr}`, color: '#ffffff', opacity: 0.3 });
        traceContainer.appendChild(line);
        setTimeout(() => { if(line.parentNode) line.parentNode.removeChild(line); }, 100);
    }

    window.setSpeed = (m) => audio.playbackRate = m;
    window.toggleShell = () => { 
        state.shellVisible = !state.shellVisible; 
        brainShell.setAttribute('visible', state.shellVisible); 
        document.getElementById('brain-core').setAttribute('visible', state.shellVisible);
    };
    
    window.takeScreenshot = () => {
        document.querySelector('a-scene').components.screenshot.capture('perspective');
        milestoneLabel.innerText = "CAPTION SAVED";
    };

    window.exportSession = () => {
        const data = { tr: Math.floor(audio.currentTime/trDuration), peak: state.peakDrift, vel: velocityDisplay.innerText };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type : 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Alice_Research_TR${data.tr}.json`;
        a.click();
    };

    window.importSession = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const data = JSON.parse(ev.target.result);
            if (data.tr !== undefined) jumpTo(data.tr);
            if (data.peak !== undefined) { state.peakDrift = data.peak; peakDisplay.innerText = state.peakDrift.toFixed(5); }
        };
        reader.readAsText(e.target.files[0]);
    };

    window.jumpTo = (tr) => { audio.currentTime = tr * trDuration; traceContainer.innerHTML = ''; audio.play(); };
    window.resetSim = () => { 
        audio.pause(); audio.currentTime = 0; state.peakDrift = 0; state.lastPos = null; state.lastTR = -1;
        peakDisplay.innerText = "0.0000"; velocityDisplay.innerText = "0.0000"; traceContainer.innerHTML = ''; 
    };
</script>
  </body>
</html>
