    <!DOCTYPE html>
    <html>
    <head>
        <title>Alice Manifold | Full-Fledged Research Simulator</title>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <style>
            :root { --accent: #FF4444; --bg: rgba(10, 12, 18, 0.95); --text: #e0e0e0; }
            body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; background: #000; }
            
            /* Research Dashboard UI */
            #dashboard {
                position: absolute; top: 20px; left: 20px; z-index: 1000;
                width: 340px; background: var(--bg); color: var(--text);
                padding: 25px; border-radius: 12px; border-left: 6px solid var(--accent);
                box-shadow: 0 20px 50px rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            }

            .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
            .label { font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1.5px; margin-bottom: 8px; }
            
            /* Timeline Scrubber Styling */
            input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); margin: 10px 0; }
            
            .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
            button { 
                padding: 12px; border: none; border-radius: 6px; font-weight: bold; 
                cursor: pointer; transition: all 0.2s; background: #2a2d35; color: white;
                text-transform: uppercase; font-size: 11px;
            }
            button.primary { background: var(--accent); }
            button:hover { background: #444; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
            button.primary:hover { background: #ff5f5f; }

            .live-stats { 
                font-family: 'Courier New', monospace; background: rgba(0,0,0,0.6); 
                padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 13px;
                border: 1px solid #333;
            }
            .hotkeys-hint { font-size: 10px; color: #666; margin-top: 15px; text-align: center; }
        </style>
    </head>
    <body>

        <div id="dashboard">
            <div class="control-group">
                <div class="label">Narrative Timeline</div>
                <input type="range" id="timeline" min="0" max="371" value="0">
                <div id="time-display" style="display:flex; justify-content: space-between; font-family: monospace;">
                    <span id="current-time">00:00</span>
                    <span id="current-tr" style="color:var(--accent)">TR 0</span>
                    <span id="total-time">--:--</span>
                </div>
            </div>

            <div class="control-group">
                <div class="label">Playback & Audio</div>
                <div class="btn-grid">
                    <button id="playBtn" class="primary">PLAY SYNC</button>
                    <button onclick="resetSim()">RESET ALL</button>
                </div>
                <div style="margin-top:15px;">
                    <div class="label">Monitor Volume</div>
                    <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
                </div>
            </div>

            <div class="control-group" style="border:none; margin:0; padding:0;">
                <div class="label">Investigation Shortcuts</div>
                <div class="btn-grid">
                    <button onclick="jumpTo(60)" style="background: #b37400; color: white;">THE FALL (TR 60)</button>
                    <button id="traceBtn" onclick="toggleTraces()">HIDE TRACES</button>
                </div>
            </div>

            <div class="live-stats">
                MANIFOLD DRIFT: <span id="drift-val" style="color:var(--accent)">0.00000</span><br>
                STABILITY: <span id="state-val">READY</span>
            </div>
            <div class="hotkeys-hint">[SPACE] PLAY/PAUSE | [B] BOOKMARK TR</div>
        </div>

        <audio id="aliceAudio" src="../data/alice_audio.wav" preload="auto"></audio>

        <a-scene background="color: #020408" renderer="antialias: true; colorManagement: true;">
        <a-light type="ambient" color="#222"></a-light>
        <a-light type="point" position="4 6 4" intensity="1" distance="50"></a-light>
        <a-light type="spot" position="-2 4 0" target="#simulation-space" intensity="0.5"></a-light>

        <a-entity id="rig" position="0 1.6 5">
            <a-entity camera look-controls wasd-controls>
                <a-text id="hud" value="SYSTEM READY" position="0 -0.7 -1.2" 
                        scale="0.25 0.25 0.25" align="center" font="monoid" color="#FFF"></a-text>
            </a-entity>
        </a-entity>

        <a-entity id="simulation-space" scale="6 6 6" position="-3 0 -3">
            <a-sphere id="cursor18" radius="0.022" color="#4CC3D9" emissive="#4CC3D9" emissiveIntensity="2"></a-sphere>
            <a-sphere id="cursor23" radius="0.022" color="#FFC65D" emissive="#FFC65D" emissiveIntensity="2"></a-sphere>
            
            <a-entity id="trace-container"></a-entity>
        </a-entity>
        </a-scene>

        <script>
            const audio = document.getElementById('aliceAudio');
            const timeline = document.getElementById('timeline');
            const driftDisplay = document.getElementById('drift-val');
            const stateDisplay = document.getElementById('state-val');
            const trDisplay = document.getElementById('current-tr');
            const currentTimeLabel = document.getElementById('current-time');
            const totalTimeLabel = document.getElementById('total-time');
            const traceContainer = document.getElementById('trace-container');
            const hud = document.getElementById('hud');
            
            let aliceData = [];
            const trDuration = 1.5; // fMRI Repetition Time
            let tracesVisible = true;

            // Helper: Convert seconds to professional MM:SS format
            function formatTime(seconds) {
                if (isNaN(seconds)) return "00:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            // 1. Data Loading
            fetch('../data/alice_vr_data.json').then(r => r.json()).then(data => {
                aliceData = data;
                timeline.max = data.length - 1;
                console.log("Aligned Manifold Data Loaded. Ready for analysis.");
                initSystem();
            });

            function initSystem() {
                // Set Total Duration Label once audio metadata is ready
                audio.onloadedmetadata = () => { totalTimeLabel.innerText = formatTime(audio.duration); };

                // Play/Pause Control
                document.getElementById('playBtn').addEventListener('click', function() {
                    if(audio.paused) {
                        audio.play();
                        this.innerText = "PAUSE";
                        this.classList.remove('primary');
                        stateDisplay.innerText = "LIVE SYNC";
                    } else {
                        audio.pause();
                        this.innerText = "PLAY SYNC";
                        this.classList.add('primary');
                        stateDisplay.innerText = "PAUSED";
                    }
                });

                // Volume Control
                document.getElementById('volume').addEventListener('input', (e) => audio.volume = e.target.value);

                // Timeline Scrubbing Logic
                timeline.addEventListener('input', (e) => {
                    const targetTime = e.target.value * trDuration;
                    audio.currentTime = targetTime;
                    currentTimeLabel.innerText = formatTime(targetTime);
                    if(tracesVisible) traceContainer.innerHTML = ''; // Clear traces when jumping
                });

                // Main Animation & Sync Loop
                function syncLoop() {
                    let currTime = audio.currentTime;
                    let tr = Math.floor(currTime / trDuration);
                    
                    if(tr < aliceData.length) {
                        const d = aliceData[tr];
                        
                        // UI Synchronization
                        timeline.value = tr;
                        trDisplay.innerText = `TR ${tr}`;
                        currentTimeLabel.innerText = formatTime(currTime);
                        driftDisplay.innerText = d.drift.toFixed(5);
                        
                        // 3D Manifold Update
                        const c18 = document.getElementById('cursor18');
                        const c23 = document.getElementById('cursor23');
                        c18.setAttribute('position', `${d.x18_vr} ${d.y18_vr} ${d.z18_vr}`);
                        c23.setAttribute('position', `${d.x23_vr} ${d.y23_vr} ${d.z23_vr}`);

                        // Investigative Visuals
                        if(tracesVisible && !audio.paused) {
                            dropTrace(d.x18_vr, d.y18_vr, d.z18_vr, '#4CC3D9');
                            dropTrace(d.x23_vr, d.y23_vr, d.z23_vr, '#FFC65D');
                            if(d.drift > 0.05) drawTether(d);
                        }

                        // Dynamic HUD Messaging
                        if(d.drift > 0.075) {
                            hud.setAttribute('value', `!! PEAK DIVERGENCE: ${formatTime(currTime)} !!`);
                            hud.setAttribute('color', '#FF4444');
                            stateDisplay.innerText = "DIVERGENT";
                        } else {
                            hud.setAttribute('value', `TIME: ${formatTime(currTime)} | DRIFT: ${d.drift.toFixed(4)}`);
                            hud.setAttribute('color', '#FFF');
                        }
                    }
                    requestAnimationFrame(syncLoop);
                }
                syncLoop();
            }

            // Trace Functions
            function dropTrace(x, y, z, color) {
                let p = document.createElement('a-sphere');
                p.setAttribute('position', `${x} ${y} ${z}`);
                p.setAttribute('radius', '0.003');
                p.setAttribute('color', color);
                p.setAttribute('opacity', '0.25');
                traceContainer.appendChild(p);
            }

            function drawTether(d) {
                let line = document.createElement('a-entity');
                line.setAttribute('line', {
                    start: `${d.x18_vr} ${d.y18_vr} ${d.z18_vr}`,
                    end: `${d.x23_vr} ${d.y23_vr} ${d.z23_vr}`,
                    color: '#FF4444',
                    opacity: 0.4
                });
                traceContainer.appendChild(line);
            }

            // Global Controllers
            window.jumpTo = (tr) => {
                audio.currentTime = tr * trDuration;
                traceContainer.innerHTML = '';
                audio.play();
                document.getElementById('playBtn').innerText = "PAUSE";
            };

            window.resetSim = () => {
                audio.currentTime = 0;
                traceContainer.innerHTML = '';
                audio.pause();
                document.getElementById('playBtn').innerText = "PLAY SYNC";
                stateDisplay.innerText = "READY";
            };

            window.toggleTraces = () => {
                tracesVisible = !tracesVisible;
                const btn = document.getElementById('traceBtn');
                btn.innerText = tracesVisible ? "HIDE TRACES" : "SHOW TRACES";
                if(!tracesVisible) traceContainer.innerHTML = '';
            };

            // Hotkey Management
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space') document.getElementById('playBtn').click();
                if(e.code === 'KeyB') {
                    const tr = Math.floor(audio.currentTime / trDuration);
                    console.log(`%c 🔖 NEURAL BOOKMARK | TR: ${tr} | Time: ${formatTime(audio.currentTime)} | Drift: ${aliceData[tr].drift.toFixed(5)}`, "color: #FFD700; font-weight: bold;");
                }
            });
        </script>
    </body>
    </html>
